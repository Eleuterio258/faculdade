# Application
spring.application.name=gestao-obras

# Server
server.port=2055

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/gestao_obras?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=minhaChaveSecretaSuperSeguraParaJWT2024GestaoObras
jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000

# S3/MinIO Storage
s3.endpoint=${S3_ENDPOINT:https://minio.u-tech.co.mz}
s3.region=${S3_REGION:us-east-1}
s3.bucket=${S3_BUCKET:cbe-vagas}
s3.public-url=${S3_PUBLIC_URL:https://minio.u-tech.co.mz}
s3.access-key=${S3_ACCESS_KEY:}
s3.secret-key=${S3_SECRET_KEY:}

